<svg width="100%" viewBox="0 0 760 638" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title>Main Thread vs Worker Thread N 흐름 다이어그램</title>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="638" fill="#f8f8f6"/>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#2a2a2a">스레드 처리 흐름</text>

  <!-- ── Column headers ── -->
  <rect x="30" y="50" width="310" height="36" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="185" y="72" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="700" fill="#3c3489">Main Thread</text>

  <rect x="390" y="50" width="340" height="36" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="560" y="72" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="700" fill="#085041">Worker Thread N</text>

  <!-- ── Vertical timeline lines (stop before wait boxes) ── -->
  <!-- Main: stop just above wait box at y=522 -->
  <line x1="185" y1="86" x2="185" y2="520" stroke="#534ab7" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- Worker: stop just above wait box at y=560 -->
  <line x1="560" y1="86" x2="560" y2="558" stroke="#0f6e56" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- ── MAIN THREAD: accept() block ── -->
  <rect x="44" y="104" width="278" height="86" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="185" cy="104" r="5" fill="#534ab7"/>
  <text x="62" y="127" dominant-baseline="central" font-size="12" font-weight="600" fill="#3c3489">accept() → 클라이언트 fd</text>
  <line x1="56" y1="140" x2="310" y2="140" stroke="#534ab7" stroke-width="0.5" opacity="0.3"/>
  <text x="62" y="158" dominant-baseline="central" font-size="12" fill="#534ab7">ServerJobData 생성</text>
  <text x="62" y="176" dominant-baseline="central" font-size="12" fill="#534ab7">thread_pool_submit(job)</text>

  <!-- ── Cross arrow: job_queue_push → job_queue_pop ── -->
  <line x1="185" y1="190" x2="185" y2="228" stroke="#534ab7" stroke-width="1.5" opacity="0.4"/>
  <rect x="90" y="218" width="148" height="26" rx="6" fill="#d8d6fa" stroke="#534ab7" stroke-width="0.8"/>
  <text x="164" y="231" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#3c3489">job_queue_push</text>

  <line x1="240" y1="231" x2="468" y2="231" stroke="#73726c" stroke-width="1.8" marker-end="url(#arr)"/>

  <rect x="470" y="218" width="148" height="26" rx="6" fill="#c8eede" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="544" y="231" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#085041">job_queue_pop()</text>
  <circle cx="560" cy="218" r="5" fill="#0f6e56"/>

  <!-- ── WORKER: execute() block ── -->
  <!-- execute box: top=262, 16px padding all sides
       title center y=262+16+6=284, divider y=300,
       5 items × 20px spacing starting y=300+16=316 → last=396, bottom edge=396+16=412 → height=150 -->
  <rect x="434" y="262" width="274" height="150" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="560" cy="262" r="5" fill="#0f6e56"/>
  <text x="452" y="278" dominant-baseline="central" font-size="12" font-weight="700" fill="#085041">execute():</text>
  <line x1="446" y1="294" x2="696" y2="294" stroke="#0f6e56" stroke-width="0.5" opacity="0.3"/>
  <text x="466" y="314" dominant-baseline="central" font-size="11" fill="#0f6e56">HTTP 파싱</text>
  <text x="466" y="334" dominant-baseline="central" font-size="11" fill="#0f6e56">SQL 분류</text>
  <text x="466" y="354" dominant-baseline="central" font-size="11" fill="#0f6e56">DB Guard 락</text>
  <text x="466" y="374" dominant-baseline="central" font-size="11" fill="#0f6e56">SQL 실행</text>
  <text x="466" y="394" dominant-baseline="central" font-size="11" fill="#0f6e56">JSON 응답 전송</text>

  <!-- Arrow execute → cleanup -->
  <line x1="560" y1="414" x2="560" y2="430" stroke="#0f6e56" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>

  <!-- ── WORKER: cleanup() block — even 16px padding all sides ── -->
  <rect x="434" y="432" width="274" height="116" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="560" cy="432" r="5" fill="#5f5e5a"/>
  <text x="452" y="456" dominant-baseline="central" font-size="12" font-weight="700" fill="#444441">cleanup():</text>
  <line x1="446" y1="472" x2="696" y2="472" stroke="#5f5e5a" stroke-width="0.5" opacity="0.3"/>
  <text x="466" y="488" dominant-baseline="central" font-size="11" fill="#5f5e5a">close(fd)</text>
  <text x="466" y="508" dominant-baseline="central" font-size="11" fill="#5f5e5a">free(buffer)</text>
  <text x="466" y="528" dominant-baseline="central" font-size="11" fill="#5f5e5a">free(job_data)</text>

  <!-- ── Wait boxes (drawn AFTER timeline so they cover the dashes) ── -->
  <!-- Main wait box -->
  <rect x="66" y="522" width="238" height="30" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="1" filter="url(#shadow)"/>
  <text x="185" y="537" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534ab7" font-style="italic">(다음 accept() 대기)</text>

  <!-- Worker wait box -->
  <rect x="446" y="560" width="228" height="30" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1" filter="url(#shadow)"/>
  <text x="560" y="575" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0f6e56" font-style="italic">(다음 pop() 대기)</text>

  <!-- ── Legend ── -->
  <rect x="30"  y="610" width="12" height="12" rx="3" fill="#eeedfe" stroke="#534ab7" stroke-width="1"/>
  <text x="46"  y="617" dominant-baseline="central" font-size="10" fill="#666">Main Thread</text>
  <rect x="155" y="610" width="12" height="12" rx="3" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1"/>
  <text x="171" y="617" dominant-baseline="central" font-size="10" fill="#666">Worker Thread (실행)</text>
  <rect x="330" y="610" width="12" height="12" rx="3" fill="#f1efe8" stroke="#5f5e5a" stroke-width="1"/>
  <text x="346" y="617" dominant-baseline="central" font-size="10" fill="#666">Worker Thread (정리)</text>
</svg>
