<svg width="100%" viewBox="0 0 1060 390" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif">
  <title>HTTP 요청 처리 흐름 다이어그램</title>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1060" height="390" fill="#f8f8f6"/>

  <!-- Title -->
  <text x="530" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#2a2a2a">HTTP 요청 처리 흐름</text>
  <text x="530" y="52" text-anchor="middle" font-size="11" fill="#999">클라이언트 → 소켓 수신 → 스레드 풀 → 요청 처리 → SQL 실행 → 응답 반환</text>

  <!-- ── STEP 01  클라이언트 ── -->
  <rect x="18" y="74" width="148" height="190" rx="10" fill="#eeedfe" stroke="#534ab7" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="76" y="66" width="32" height="18" rx="9" fill="#534ab7"/>
  <text x="92" y="79" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="700" fill="#fff">01</text>
  <text x="92" y="108" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#3c3489">클라이언트</text>
  <line x1="30" y1="124" x2="154" y2="124" stroke="#534ab7" stroke-width="0.5" opacity="0.35"/>
  <text x="92" y="148" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534ab7">HTTP POST /</text>
  <text x="92" y="168" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534ab7">body: SQL 쿼리</text>
  <text x="92" y="236" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#9991d8">요청 전송</text>

  <line x1="168" y1="169" x2="192" y2="169" stroke="#73726c" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STEP 02  소켓 수신 ── -->
  <rect x="194" y="74" width="148" height="190" rx="10" fill="#e6f1fb" stroke="#185fa5" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="252" y="66" width="32" height="18" rx="9" fill="#185fa5"/>
  <text x="268" y="79" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="700" fill="#fff">02</text>
  <text x="268" y="104" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#0c447c">socket_server.c</text>
  <line x1="206" y1="118" x2="330" y2="118" stroke="#185fa5" stroke-width="0.5" opacity="0.35"/>
  <text x="268" y="140" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#0c447c">소켓 수신</text>
  <text x="268" y="162" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#185fa5">accept() → fd 획득</text>
  <text x="268" y="180" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#185fa5">HTTP 헤더 파싱</text>
  <text x="268" y="198" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#185fa5">바디 수신</text>
  <text x="268" y="236" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#5a98d4">연결 수락 · 파싱</text>

  <line x1="344" y1="169" x2="368" y2="169" stroke="#73726c" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STEP 03  스레드 풀 ── -->
  <rect x="370" y="74" width="148" height="190" rx="10" fill="#faeeda" stroke="#854f0b" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="428" y="66" width="32" height="18" rx="9" fill="#854f0b"/>
  <text x="444" y="79" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="700" fill="#fff">03</text>
  <text x="444" y="104" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#633806">thread_pool.c</text>
  <line x1="382" y1="118" x2="506" y2="118" stroke="#854f0b" stroke-width="0.5" opacity="0.35"/>
  <text x="444" y="140" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#633806">스레드 풀</text>
  <text x="444" y="162" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854f0b">JobData 생성</text>
  <text x="444" y="180" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854f0b">queue_push</text>
  <text x="444" y="198" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854f0b">워커 스레드 실행</text>
  <text x="444" y="236" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#c07e3a">비동기 작업 디스패치</text>

  <line x1="520" y1="169" x2="544" y2="169" stroke="#73726c" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STEP 04  요청 처리 ── -->
  <rect x="546" y="74" width="148" height="190" rx="10" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="604" y="66" width="32" height="18" rx="9" fill="#0f6e56"/>
  <text x="620" y="79" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="700" fill="#fff">04</text>
  <text x="620" y="104" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#085041">request_handler.c</text>
  <line x1="558" y1="118" x2="682" y2="118" stroke="#0f6e56" stroke-width="0.5" opacity="0.35"/>
  <text x="620" y="140" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#085041">요청 처리</text>
  <text x="620" y="162" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0f6e56">SQL 분류 (R/W)</text>
  <text x="620" y="180" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0f6e56">DB Guard 락 획득</text>
  <text x="620" y="198" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0f6e56">sql_service 호출</text>
  <text x="620" y="236" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#3a9e80">분류 · 락 · 위임</text>

  <line x1="696" y1="169" x2="720" y2="169" stroke="#73726c" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STEP 05  SQL 실행 ── -->
  <rect x="722" y="74" width="148" height="190" rx="10" fill="#faece7" stroke="#993c1d" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="780" y="66" width="32" height="18" rx="9" fill="#993c1d"/>
  <text x="796" y="79" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="700" fill="#fff">05</text>
  <text x="796" y="104" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#712b13">sql_service.c</text>
  <line x1="734" y1="118" x2="858" y2="118" stroke="#993c1d" stroke-width="0.5" opacity="0.35"/>
  <text x="796" y="140" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#712b13">SQL 실행</text>
  <text x="796" y="162" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#993c1d">토크나이징 · 파싱</text>
  <text x="796" y="180" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#993c1d">B+Tree 실행</text>
  <text x="796" y="198" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#993c1d">결과 반환</text>
  <text x="796" y="236" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#c0614a">파싱 · 인덱스 조회</text>

  <line x1="872" y1="169" x2="896" y2="169" stroke="#73726c" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STEP 06  응답 반환 ── -->
  <rect x="898" y="74" width="148" height="190" rx="10" fill="#eeedfe" stroke="#534ab7" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="956" y="66" width="32" height="18" rx="9" fill="#534ab7"/>
  <text x="972" y="79" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="700" fill="#fff">06</text>
  <text x="972" y="104" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#3c3489">socket_server.c</text>
  <line x1="910" y1="118" x2="1034" y2="118" stroke="#534ab7" stroke-width="0.5" opacity="0.35"/>
  <text x="972" y="140" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="600" fill="#3c3489">응답 반환</text>
  <text x="972" y="162" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534ab7">JSON 직렬화</text>
  <text x="972" y="180" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534ab7">HTTP 응답 생성</text>
  <text x="972" y="198" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534ab7">소켓 전송 · fd 정리</text>
  <text x="972" y="236" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#9991d8">직렬화 · 전송 · 정리</text>

  <!-- ── Bottom return bar ── -->
  <line x1="972" y1="266" x2="972" y2="284" stroke="#73726c" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="92"  y1="266" x2="92"  y2="284" stroke="#73726c" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="18" y="286" width="1028" height="44" rx="10" fill="#eeedfe" stroke="#534ab7" stroke-width="1" opacity="0.85" filter="url(#shadow)"/>
  <text x="530" y="308" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="700" fill="#3c3489">클라이언트  —  JSON 응답 수신</text>

  <!-- ── Legend ── -->
  <rect x="18"  y="352" width="10" height="10" rx="2" fill="#eeedfe" stroke="#534ab7" stroke-width="1"/>
  <text x="32"  y="358" dominant-baseline="central" font-size="10" fill="#666">클라이언트 / 응답</text>
  <rect x="158" y="352" width="10" height="10" rx="2" fill="#e6f1fb" stroke="#185fa5" stroke-width="1"/>
  <text x="172" y="358" dominant-baseline="central" font-size="10" fill="#666">socket_server.c</text>
  <rect x="290" y="352" width="10" height="10" rx="2" fill="#faeeda" stroke="#854f0b" stroke-width="1"/>
  <text x="304" y="358" dominant-baseline="central" font-size="10" fill="#666">thread_pool.c</text>
  <rect x="404" y="352" width="10" height="10" rx="2" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1"/>
  <text x="418" y="358" dominant-baseline="central" font-size="10" fill="#666">request_handler.c</text>
  <rect x="548" y="352" width="10" height="10" rx="2" fill="#faece7" stroke="#993c1d" stroke-width="1"/>
  <text x="562" y="358" dominant-baseline="central" font-size="10" fill="#666">sql_service.c</text>
</svg>
